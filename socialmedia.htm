<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AL AMAN – Contact Card</title>
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a96e;
      --gold-light: #e8d5b0;
      --dark: #1a1a1a;
      --card-bg: #fff;
      --item-bg: #faf8f4;
      --border: rgba(180,140,80,0.18);
      --radius-card: 28px;
      --radius-item: 16px;
      --radius-icon: 13px;
    }

    html, body {
      min-height: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: #f2ece0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 12px 40px;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border: 1.5px solid rgba(180,140,80,0.22);
      border-radius: var(--radius-card);
      width: 100%;
      max-width: 560px;
      overflow: hidden;
      box-shadow: 0 10px 50px rgba(180,140,80,0.14);
    }

    /* ── Header ── */
    .card-header {
      background: var(--dark);
      padding: 32px 24px 26px;
      text-align: center;
      position: relative;
    }
    .card-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .logo-circle {
      width: 82px; height: 82px;
      border-radius: 50%;
      border: 2.5px solid rgba(201,169,110,0.55);
      margin: 0 auto 14px;
      display: flex; align-items: center; justify-content: center;
      background: #222;
      overflow: hidden;
    }
    .logo-circle img {
      width: 80%; height: 80%;
      object-fit: contain;
    }

    .store-name {
      font-family: 'El Messiri', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.18em;
    }
    .store-tagline {
      font-size: 12px;
      color: rgba(255,255,255,0.42);
      letter-spacing: 0.06em;
      margin-top: 5px;
      font-weight: 300;
    }

    /* ── Grid ── */
    .links-grid {
      padding: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ── Every link item is EQUAL HEIGHT box ── */
    .link-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--item-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-item);
      padding: 18px 12px 16px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.18s, box-shadow 0.2s;
      min-height: 110px;
      text-align: center;
    }
    .link-item:hover, .link-item:active {
      background: #fff8ec;
      border-color: rgba(201,169,110,0.5);
      transform: translateY(-2px);
      box-shadow: 0 5px 18px rgba(180,140,80,0.16);
    }

    /* full-width spans both columns */
    .link-item.full {
      grid-column: 1 / -1;
      flex-direction: row;
      justify-content: flex-start;
      min-height: 76px;
      padding: 16px 18px;
      text-align: left;
      gap: 14px;
    }

    /* ── Icon wrap ── */
    .icon-wrap {
      width: 50px; height: 50px;
      border-radius: var(--radius-icon);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .link-item.full .icon-wrap {
      width: 46px; height: 46px;
    }
    .icon-wrap svg {
      width: 24px; height: 24px;
    }

    /* ── Text ── */
    .link-text { min-width: 0; }
    .link-item:not(.full) .link-text { text-align: center; }

    .link-label {
      font-size: 10px;
      color: #a08050;
      letter-spacing: 0.09em;
      font-weight: 700;
      line-height: 1;
      text-transform: uppercase;
    }
    .link-value {
      font-family: 'El Messiri', serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--dark);
      margin-top: 4px;
      line-height: 1.3;
      word-break: break-word;
    }
    .link-item.full .link-value {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 15px;
    }

    /* spacer pushes arrow to the right in full rows */
    .link-item.full .link-text { flex: 1; }

    /* ── Arrow ── */
    .arrow-icon {
      width: 13px; height: 13px;
      flex-shrink: 0;
      margin-left: auto;
    }

    /* ── Icon colours ── */
    .wa  { background: #e5f9ee; } .wa  svg { fill: #25d366; }
    .ig  { background: #fde8f0; } .ig  svg { fill: #e1306c; }
    .fb  { background: #e8f0fd; } .fb  svg { fill: #1877f2; }
    .web { background: #fdf5e8; }
    .ph  { background: #e8f5fd; }
    .loc { background: #fde8e8; }
    .gr  { background: #eaf4ec; }

    /* ── Mobile fine-tuning ── */
    @media (max-width: 400px) {
      .card-header { padding: 26px 16px 20px; }
      .logo-circle { width: 70px; height: 70px; }
      .store-name  { font-size: 22px; }
      .links-grid  { padding: 13px; gap: 10px; }
      .link-item   { min-height: 100px; padding: 14px 10px 12px; }
      .link-item.full { min-height: 68px; padding: 13px 14px; }
      .icon-wrap   { width: 44px; height: 44px; }
      .icon-wrap svg { width: 21px; height: 21px; }
      .link-value  { font-size: 13px; }
      .link-item.full .link-value { font-size: 13px; }
    }

    @media (max-width: 320px) {
      .links-grid { grid-template-columns: 1fr; }
      .link-item.full { grid-column: 1; }
      .link-item { flex-direction: row; text-align: left; min-height: auto; padding: 14px; }
      .link-item:not(.full) .link-text { text-align: left; }
    }
  </style>
</head>
